@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Rajdhani:wght@700&display=swap');
@import "tailwindcss";

:root {
  --color-black: #000000;
  --color-navy: #060620;
  --color-blue: #1a1aff;
  --color-cyan: #00d4ff;
  --color-muted: #8892b0;
  --color-white: #ffffff;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--color-black);
  color: var(--color-white);
  font-family: 'DM Sans', sans-serif;
}

a,
button {
  transition: all 0.25s ease;
}

.font-rajdhani {
  font-family: 'Rajdhani', sans-serif;
}

.hero-section {
  background:
    radial-gradient(circle at 50% 85%, rgba(26, 26, 255, 0.34), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(6, 6, 32, 0.95), rgba(0, 0, 0, 1) 70%);
}

.hero-glow {
  position: absolute;
  inset: auto 50% 15% auto;
  width: min(42rem, 72vw);
  height: min(42rem, 72vw);
  transform: translateX(50%);
  border-radius: 9999px;
  background: radial-gradient(circle, rgba(26, 26, 255, 0.55) 0%, rgba(0, 212, 255, 0.18) 38%, transparent 72%);
  filter: blur(18px);
  animation: pulseGlow 4s infinite ease-in-out;
  pointer-events: none;
}

@keyframes pulseGlow {
  0%,
  100% {
    opacity: 0.65;
    transform: translateX(50%) scale(0.95);
  }
  50% {
    opacity: 1;
    transform: translateX(50%) scale(1.08);
  }
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.85rem;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 9999px;
  padding: 0.8rem 1.2rem;
  color: var(--color-white);
  text-transform: uppercase;
  letter-spacing: 0.28em;
  font-size: 0.72rem;
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.08);
}

.badge-dot {
  width: 0.65rem;
  height: 0.65rem;
  border-radius: 9999px;
  background: var(--color-cyan);
  box-shadow: 0 0 18px rgba(0, 212, 255, 0.95);
  animation: pulseGlow 4s infinite ease-in-out;
}

.hero-gradient {
  background: linear-gradient(90deg, #ffffff 0%, #7b87ff 48%, #00d4ff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.btn-primary,
.btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 3.6rem;
  border-radius: 9999px;
  padding: 0 1.5rem;
  font-size: 0.88rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-blue), var(--color-cyan));
  color: var(--color-white);
  box-shadow: 0 18px 45px rgba(26, 26, 255, 0.28);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 24px 50px rgba(0, 212, 255, 0.24);
}

.btn-ghost {
  border: 1px solid rgba(255, 255, 255, 0.55);
  color: var(--color-white);
  background: transparent;
}

.btn-ghost:hover {
  background: var(--color-blue);
  border-color: var(--color-blue);
}

.stats-grid {
  border-left: 1px solid rgba(255, 255, 255, 0.08);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
}

.stat-cell {
  padding: 2rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
}

.stat-value {
  display: block;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(3rem, 7vw, 4.8rem);
  line-height: 0.9;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.stat-cell p,
.section-copy {
  color: var(--color-muted);
  line-height: 1.9;
}

.section-intro {
  max-width: 56rem;
}

.section-kicker {
  display: inline-flex;
  color: var(--color-cyan);
  text-transform: uppercase;
  letter-spacing: 0.28em;
  font-size: 0.75rem;
}

.section-title {
  margin-top: 1.2rem;
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(2.5rem, 5vw, 4.4rem);
  line-height: 0.95;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.service-card {
  position: relative;
  background: #050507;
  padding: 2rem;
  min-height: 20rem;
}

.service-topline {
  position: absolute;
  top: 0;
  left: 0;
  height: 1px;
  width: 100%;
  background: rgba(255, 255, 255, 0.12);
}

.service-card:hover .service-topline {
  background: linear-gradient(90deg, var(--color-blue), var(--color-cyan));
}

.service-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 3.3rem;
  height: 3.3rem;
  border: 1px solid rgba(255, 255, 255, 0.14);
  color: var(--color-cyan);
}

.portfolio-card {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.02);
  border-radius: 4px;
  overflow: hidden;
  padding: 0;
}

.portfolio-grid {
  gap: 28px;
}

.portfolio-info {
  padding: 22px 28px;
}

.browser-frame {
  position: relative;
  overflow: hidden;
  border-radius: 4px 4px 0 0;
  border: none;
  height: 420px;
}

.browser-bar {
  display: flex;
  gap: 0.4rem;
  padding: 0.9rem 1rem;
  background: rgba(255, 255, 255, 0.04);
}

.browser-bar span {
  width: 0.55rem;
  height: 0.55rem;
  border-radius: 9999px;
  background: rgba(255, 255, 255, 0.25);
}

.mockup-content {
  position: relative;
  height: calc(420px - 44px);
  padding: 0;
}

.mockup-nav {
  position: absolute;
  inset: 0 0 auto 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  z-index: 2;
  text-transform: uppercase;
}

.mockup-nav button,
.elara-actions span,
.zenta-button,
.onyx-actions span {
  border-radius: 9999px;
}

.mockup-elara {
  background-image:
    linear-gradient(to right, rgba(0, 0, 0, 0.8) 55%, rgba(0, 0, 0, 0.15) 100%),
    url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=800&q=80');
  background-size: cover;
  background-position: center;
}

.elara-content {
  position: relative;
  color: white;
}

.elara-nav {
  padding: 16px 28px;
  background: transparent;
}

.elara-logo {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 4px;
}

.elara-content .mockup-nav button {
  border: 1px solid rgba(255, 255, 255, 0.35);
  padding: 7px 16px;
  color: white;
  font-size: 10px;
  letter-spacing: 2px;
}

.elara-hero {
  position: absolute;
  left: 48px;
  top: 50%;
  transform: translateY(-50%);
  max-width: 320px;
}

.elara-kicker,
.onyx-kicker,
.zenta-kicker,
.onyx-subline,
.zenta-subline {
  text-transform: uppercase;
}

.elara-kicker {
  margin-bottom: 20px;
  color: rgba(212, 165, 116, 0.9);
  font-size: 10px;
  letter-spacing: 3px;
}

.elara-hero h3,
.zenta-hero h3 {
  margin: 0;
  font-weight: 400;
}

.elara-hero h3 {
  margin-bottom: 28px;
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 48px;
  line-height: 1;
}

.elara-actions,
.onyx-actions {
  display: flex;
  flex-wrap: wrap;
}

.elara-actions span,
.onyx-actions span {
  border: 1px solid rgba(255, 255, 255, 0.5);
  padding: 11px 26px 10px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: white;
  background: transparent;
}

.mockup-zenta {
  background-image:
    linear-gradient(to bottom, rgba(4, 12, 8, 0.55) 0%, rgba(4, 12, 8, 0.85) 100%),
    url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800&q=80');
  background-size: cover;
  background-position: center;
}

.zenta-content {
  position: relative;
  color: #f7f2e8;
}

.zenta-nav {
  padding: 16px 28px;
  background: transparent;
}

.zenta-logo {
  font-size: 15px;
  letter-spacing: 7px;
  font-weight: 300;
}

.zenta-nav-right {
  display: flex;
  align-items: center;
}

.zenta-content .mockup-nav button {
  border: 1px solid rgba(196, 163, 90, 0.6);
  color: #c4a35a;
  padding: 7px 16px;
  font-size: 10px;
  letter-spacing: 2px;
}

.zenta-hero {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 75%;
  text-align: center;
}

.zenta-kicker {
  margin-bottom: 22px;
  color: rgba(196, 163, 90, 0.8);
  font-size: 10px;
  letter-spacing: 3px;
}

.zenta-hero h3 {
  margin-bottom: 30px;
  font-family: Georgia, serif;
  font-size: 54px;
  font-weight: 300;
  line-height: 0.95;
}

.zenta-button {
  border: 1px solid rgba(196, 163, 90, 0.7);
  padding: 12px 32px 10px;
  color: #c4a35a;
  font-size: 10px;
  letter-spacing: 2.5px;
  background: transparent;
  text-transform: uppercase;
}

.mockup-onyx {
  background-image:
    linear-gradient(to right, rgba(0, 0, 0, 0.85) 50%, rgba(0, 0, 0, 0.3) 100%),
    url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=800&q=80');
  background-size: cover;
  background-position: top center;
}

.onyx-content {
  position: relative;
  color: white;
}

.onyx-nav {
  padding: 16px 28px;
  background: transparent;
}

.onyx-logo {
  color: #c9a84c;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 6px;
}

.onyx-content .mockup-nav button {
  background: #c9a84c;
  color: black;
  padding: 8px 18px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
}

.onyx-hero {
  position: absolute;
  left: 44px;
  top: 50%;
  transform: translateY(-50%);
  max-width: 300px;
}

.onyx-hero h3 {
  margin: 0 0 28px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 58px;
  font-weight: 700;
  line-height: 0.92;
  letter-spacing: -0.5px;
  text-transform: none;
}

.onyx-kicker {
  margin-bottom: 20px;
  color: rgba(201, 168, 76, 0.8);
  font-size: 10px;
  letter-spacing: 3px;
}

.tag-pill {
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 0.45rem 0.8rem;
  border-radius: 9999px;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--color-muted);
}

.timeline {
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 0.8rem;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, rgba(26, 26, 255, 0.2), rgba(0, 212, 255, 0.85), rgba(26, 26, 255, 0.2));
}

.timeline-step {
  position: relative;
}

.timeline-number {
  color: var(--color-muted);
  font-size: 0.8rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
}

.timeline-dot {
  width: 0.9rem;
  height: 0.9rem;
  margin-top: 0.75rem;
  border-radius: 9999px;
  background: radial-gradient(circle, white 0%, var(--color-cyan) 55%, rgba(0, 212, 255, 0.1) 100%);
  box-shadow: 0 0 18px rgba(0, 212, 255, 0.55);
}

.cta-panel {
  background:
    radial-gradient(circle at 50% 35%, rgba(26, 26, 255, 0.24), transparent 32%),
    radial-gradient(circle at 50% 20%, rgba(0, 212, 255, 0.12), transparent 24%),
    #05050d;
}

.footer-link {
  color: var(--color-muted);
  text-decoration: none;
}

.footer-link:hover {
  color: white;
}

@media (min-width: 769px) {
  .portfolio-section {
    padding-left: 80px;
    padding-right: 80px;
  }
}

@media (max-width: 768px) {
  .hero-section {
    min-height: auto;
    padding-top: 7rem;
  }

  .badge {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }

  .stat-cell {
    border-right: none;
  }

  .service-grid,
  .timeline,
  .portfolio-card {
    grid-template-columns: 1fr;
  }

  .timeline::before {
    display: none;
  }

  .browser-frame {
    height: auto;
    min-height: 420px;
  }

  .mockup-content {
    height: auto;
    min-height: 376px;
  }

  .mockup-nav {
    flex-wrap: wrap;
  }

  .elara-hero,
  .onyx-hero {
    left: 24px;
    width: calc(100% - 48px);
  }

  .zenta-hero {
    width: calc(100% - 48px);
  }

  .elara-hero h3 {
    font-size: 38px;
  }

  .zenta-hero h3 {
    font-size: 44px;
  }

  .onyx-hero h3 {
    font-size: 48px;
  }
}
